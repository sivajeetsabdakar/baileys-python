<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Baileys Python overview</title>
  <desc id="desc">A visual overview of the Baileys Python client, protocol foundation, persistence stores, events, and application integrations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="core" x1="0" x2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 34px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #475569; }
      .label { font: 700 18px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #475569; }
      .tiny { font: 600 12px Inter, Segoe UI, Arial, sans-serif; fill: #64748b; letter-spacing: .04em; }
      .white { fill: #ffffff; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; rx: 18; filter: url(#shadow); }
      .soft { fill: #f8fafc; stroke: #dbeafe; stroke-width: 1; rx: 14; }
      .line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1100" height="520" rx="28" fill="url(#bg)"/>

  <text x="48" y="64" class="title">Baileys Python</text>
  <text x="48" y="94" class="subtitle">Async WhatsApp Web protocol client for Python apps, workers, and automation backends.</text>

  <rect x="410" y="135" width="280" height="170" rx="24" fill="url(#core)" filter="url(#shadow)"/>
  <text x="550" y="178" text-anchor="middle" class="label white">WhatsAppClient</text>
  <text x="550" y="207" text-anchor="middle" class="small white">make_socket</text>
  <text x="550" y="233" text-anchor="middle" class="small white">send_message / events</text>
  <text x="550" y="259" text-anchor="middle" class="small white">Baileys-compatible aliases</text>

  <rect x="48" y="140" width="270" height="76" class="box"/>
  <text x="72" y="171" class="tiny">APPLICATIONS</text>
  <text x="72" y="196" class="label">Bots, SaaS, tools</text>

  <rect x="48" y="270" width="270" height="92" class="box"/>
  <text x="72" y="301" class="tiny">PUBLIC API</text>
  <text x="72" y="326" class="label">Text, media, groups</text>
  <text x="72" y="348" class="small">Pythonic async methods</text>

  <rect x="782" y="140" width="270" height="92" class="box"/>
  <text x="806" y="171" class="tiny">PERSISTENCE</text>
  <text x="806" y="196" class="label">Auth and Signal state</text>
  <text x="806" y="218" class="small">File, SQLite, Postgres stores</text>

  <rect x="782" y="285" width="270" height="92" class="box"/>
  <text x="806" y="316" class="tiny">EVENTS</text>
  <text x="806" y="341" class="label">Messages and receipts</text>
  <text x="806" y="363" class="small">Store updates and webhooks</text>

  <rect x="382" y="365" width="336" height="86" class="box"/>
  <text x="550" y="397" text-anchor="middle" class="tiny">PROTOCOL FOUNDATION</text>
  <text x="550" y="424" text-anchor="middle" class="label">WAProto, WABinary, Noise, Signal</text>

  <path class="line" d="M318 178 C350 178 366 178 402 189"/>
  <path class="line" d="M318 316 C354 303 375 285 405 257"/>
  <path class="line" d="M690 196 C727 186 746 186 782 186"/>
  <path class="line" d="M690 259 C730 281 748 310 782 329"/>
  <path class="dash" d="M550 305 C550 328 550 338 550 365"/>

  <rect x="48" y="420" width="236" height="44" class="soft"/>
  <text x="166" y="448" text-anchor="middle" class="small">QR pairing + saved reconnect</text>

  <rect x="312" y="420" width="214" height="44" class="soft"/>
  <text x="419" y="448" text-anchor="middle" class="small">Typed errors</text>

  <rect x="574" y="420" width="214" height="44" class="soft"/>
  <text x="681" y="448" text-anchor="middle" class="small">Offline parity tests</text>

  <rect x="816" y="420" width="236" height="44" class="soft"/>
  <text x="934" y="448" text-anchor="middle" class="small">Live-proofed core flows</text>
</svg>
